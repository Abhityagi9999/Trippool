<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - TripPool AI</title>
    <link rel="stylesheet" href="/static/css/index.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            background: var(--bg);
            color: var(--t1);
        }
        .offline-container {
            padding: 20px;
        }
        .offline-icon {
            font-size: 5rem;
            margin-bottom: 20px;
        }
        h1 { font-size: 1.8rem; margin-bottom: 10px; }
        p { color: var(--t2); margin-bottom: 30px; }
    </style>
</head>
<body>
    <div class="offline-container">
        <div class="offline-icon">📡</div>
        <h1>You're Offline</h1>
        <p>It looks like you don't have an internet connection. Please check your network and try again.</p>
        <button class="btn btn-p" onclick="window.location.reload()">Retry Connection</button>
    </div>
</body>
</html>
