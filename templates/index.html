<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>TripPool AI – Split Expenses Smartly</title>
    <meta name="description" content="Smart group expense manager for trips. Voice-powered, AI-parsed, zero hassle.">
    <link rel="stylesheet" href="/static/css/index.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✈️</text></svg>">
</head>
<body>
<div class="topbar">
    <span class="topbar-title">✈️ TripPool AI</span>
        <button onclick="document.getElementById('accMenuModal').classList.remove('hidden')" style="display:flex;align-items:center;gap:6px;background:rgba(255,255,255,0.05);padding:6px 14px;border-radius:100px;border:1px solid rgba(255,255,255,0.1); cursor:pointer; color:var(--t1); transition:0.2s;" onmouseover="this.style.background='rgba(255,255,255,0.1)'" onmouseout="this.style.background='rgba(255,255,255,0.05)'">
            <span style="font-size:0.8rem">👤</span>
            <span style="font-size:0.85rem; font-weight:600;">{{ username }}</span>
            <span style="font-size:0.6rem; color:var(--t3); margin-left:4px;">▼</span>
        </button>
        <button onclick="window.location.href='/logout'" style="display:flex;align-items:center;gap:6px;background:rgba(239,68,68,0.15);padding:6px 14px;border-radius:100px;border:1px solid rgba(239,68,68,0.3); cursor:pointer; color:#ef4444; font-size:0.85rem; font-weight:600; transition:0.2s;" onmouseover="this.style.background='rgba(239,68,68,0.25)'" onmouseout="this.style.background='rgba(239,68,68,0.15)'" title="Log out to the account selection screen">Log Out</button>
        <button class="btn btn-sm btn-g hidden" id="seedBtn" style="display:none;">Try Demo</button>
    </div>
</div>
<div class="container">
    <div class="hero">
        <span class="hero-emoji">✈️</span>
        <h1>TripPool AI</h1>
        <p>Split trip expenses in seconds.<br>Just speak or type — we handle the math.</p>
        <button class="btn btn-p btn-block" onclick="openC()">➕ &nbsp;Create New Trip</button>
    </div>
    <div class="shdr"><h3>Your Trips</h3></div>
    <div class="trip-list" id="list"><div class="spin"></div></div>
</div>

<!-- Create Modal -->
<div class="ov hidden" id="cModal">
    <div class="modal">
        <div class="mhdr">
            <div style="display:flex;align-items:center;gap:10px">
                <h2 style="margin:0">🚀 New Trip</h2>
                <button id="trMic" class="mic-btn" style="position:static;width:34px;height:34px;transform:none" title="Use Voice AI to autofill">🎤</button>
            </div>
            <button class="mx" onclick="closeC()">&times;</button>
        </div>
        <div id="trAiBox" style="display:none;font-size:0.85rem;background:var(--bg2);padding:10px;border-radius:var(--r);margin-bottom:15px;color:var(--t1);border:1px solid var(--brd)"></div>
        <div class="fg"><label>Trip Name</label><input id="iName" placeholder="e.g. Goa Trip 🏖️" autofocus></div>
        <div class="shdr"><h3>Members</h3><button class="btn btn-sm btn-g" onclick="addR()">+ Add</button></div>
        <div id="rows">
            <div class="mrow">
                <div style="flex:1"><label>Member Name</label><input placeholder="e.g. Alice" data-f="n"></div>
                <div style="width:105px"><label>Put In (₹)</label><input type="number" placeholder="0" data-f="p" value="0"></div>
            </div>
            <div class="mrow">
                <div style="flex:1"><label>Member Name</label><input placeholder="e.g. Bob" data-f="n"></div>
                <div style="width:105px"><label>Put In (₹)</label><input type="number" placeholder="0" data-f="p" value="0"></div>
            </div>
        </div>
        <button class="btn btn-p btn-block mt-16" onclick="create()">Start Trip →</button>
    </div>
</div>
<!-- Account Switcher Modal (Bottom Sheet over Dark Glass) -->
<div class="ov hidden" id="accMenuModal" style="z-index:900;" onclick="this.classList.add('hidden')">
    <div class="modal" id="accMenuContent" style="background:rgba(15,23,42,0.95); backdrop-filter:blur(24px); -webkit-backdrop-filter:blur(24px); border:1px solid rgba(255,255,255,0.1); padding:24px; box-shadow:0 -10px 40px rgba(0,0,0,0.5); border-radius:var(--r) var(--r) 0 0;" onclick="event.stopPropagation()">
        
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h3 style="margin:0; font-size:1.3rem; font-weight:700; color:#fff;">Accounts</h3>
            <button onclick="document.getElementById('accMenuModal').classList.add('hidden')" style="background:rgba(255,255,255,0.1); border:none; border-radius:50%; width:32px; height:32px; color:#fff; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:1.2rem; transition:0.2s;" onmouseover="this.style.background='rgba(255,255,255,0.2)'" onmouseout="this.style.background='rgba(255,255,255,0.1)'">&times;</button>
        </div>

        <div style="padding-bottom:16px; border-bottom:1px solid rgba(255,255,255,0.08); margin-bottom:12px;">
            <div style="font-size:0.75rem; color:var(--t2); font-weight:600; text-transform:uppercase; letter-spacing:0.05em; margin-bottom:10px;">Current Account</div>
            <div style="display:flex; justify-content:space-between; align-items:center; background:rgba(255,255,255,0.03); padding:12px 16px; border-radius:12px; border:1px solid rgba(99,102,241,0.3);">
                <span style="font-size:1.1rem; color:#fff; font-weight:700; display:flex; align-items:center; gap:12px;">
                    <span style="font-size:1.4rem; filter:drop-shadow(0 0 8px rgba(129,140,248,0.5));">👤</span> {{ username }}
                </span>
                <button onclick="removeActiveAccount('{{ username }}');document.getElementById('accMenuModal').classList.add('hidden')" style="background:rgba(239, 68, 68, 0.15); border:1px solid rgba(239, 68, 68, 0.3); border-radius:8px; padding:6px 12px; color:var(--red); font-size:0.8rem; font-weight:600; cursor:pointer;" title="Remove this account from device" onmouseover="this.style.background='rgba(239,68,68,0.25)'" onmouseout="this.style.background='rgba(239,68,68,0.15)'">Remove</button>
            </div>
        </div>
        
        <div id="otherAccountsList"></div>
        
        <button onclick="window.location.href='/logout'" style="width:100%; text-align:left; background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.08); padding:14px 16px; color:var(--t1); font-weight:500; cursor:pointer; font-size:1rem; border-radius:12px; display:flex; align-items:center; gap:12px; transition:0.2s; margin-top:8px;" onmouseover="this.style.background='rgba(255,255,255,0.08)'" onmouseout="this.style.background='rgba(255,255,255,0.03)'">
            <span style="font-size:1.3rem;">🚪</span> Add another account
        </button>
    </div>
</div>

<!-- Custom Auth Modal -->
<div class="ov hidden" id="authModal" style="align-items:center; z-index:9999;">
    <div style="position:relative; max-width:400px; width:100%; padding:36px; background:rgba(14,21,37,0.85); backdrop-filter:blur(40px); -webkit-backdrop-filter:blur(40px); border:1px solid rgba(255,255,255,0.08); border-radius:24px; box-shadow:0 30px 60px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.05); text-align:center;">
        <h2 id="amTitle" style="color:#fff; margin-top:0; font-size:1.5rem; margin-bottom:10px; font-weight:800; letter-spacing:-0.03em;"></h2>
        <p id="amText" style="color:var(--t2); font-size:0.95rem; margin-bottom:20px; line-height:1.5;"></p>
        <div id="amPassDisplay" style="display:none; background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.08); border-radius:16px; padding:18px; font-family:monospace; font-size:1.8rem; letter-spacing:4px; margin-bottom:24px; color:var(--t1); font-weight:700;"></div>
        <div style="display:flex; gap:12px;">
            <button class="btn btn-g" style="flex:1" onclick="closeAuthModal()" id="amCancel">Cancel</button>
            <button class="btn btn-p" style="flex:1; margin-top:0; padding:12px; font-size:1.05rem;" id="amConfirm">OK</button>
        </div>
    </div>
</div>

<div class="toasts" id="T"></div>

<script>
const A='';
document.addEventListener("DOMContentLoaded", () => {
    const currentUser = "{{ username }}";
    const accounts = JSON.parse(localStorage.getItem('tpAccs') || '[]');
    const otherAccounts = accounts.filter(a => a.username !== currentUser);
    
    const list = document.getElementById('otherAccountsList');
    if(list && otherAccounts.length > 0) {
        let html = '<div style="font-size:0.75rem; color:var(--t2); font-weight:600; text-transform:uppercase; letter-spacing:0.05em; margin:16px 0 10px 4px;">Switch Account</div>';
        otherAccounts.forEach(acc => {
            html += `<button onclick="switchAccount('${acc.username}', '${acc.password}');event.stopPropagation()" style="width:100%; text-align:left; background:none; border:none; padding:12px 16px; margin-bottom:4px; color:var(--t2); font-weight:600; cursor:pointer; font-size:1.05rem; border-radius:12px; display:flex; align-items:center; gap:12px; transition:0.2s;" onmouseover="this.style.background='rgba(255,255,255,0.05)'; this.style.color='var(--t1)';" onmouseout="this.style.background='none'; this.style.color='var(--t2)';">
                <span style="font-size:1.3rem; filter:grayscale(1);">👤</span> ${acc.username}
            </button>`;
        });
        html += '<div style="height:1px; background:rgba(255,255,255,0.08); margin:16px 0;"></div>';
        list.innerHTML = html;
    }
});

async function switchAccount(u, p) {
    try {
        const r = await fetch('/login', {
            method: 'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({username: u, password: p})
        });
        if(r.ok) { 
            let accounts = JSON.parse(localStorage.getItem('tpAccs') || '[]');
            accounts = accounts.filter(a => a.username !== u);
            accounts.unshift({username: u, password: p});
            localStorage.setItem('tpAccs', JSON.stringify(accounts));
            window.location.href = '/'; 
        } else { 
            alert("Saved password invalid. Please log in manually."); 
            window.location.href = '/logout'; 
        }
    } catch(e) { }
}

function showAuthModal(title, text, pass, confirmText, onConfirm, showCancel, isDanger) {
    document.getElementById('amTitle').textContent = title;
    document.getElementById('amText').textContent = text;
    
    const passBox = document.getElementById('amPassDisplay');
    if(pass) {
        passBox.style.display = 'block'; passBox.textContent = pass;
    } else {
        passBox.style.display = 'none';
    }
    
    document.getElementById('amCancel').style.display = showCancel ? 'block' : 'none';
    
    const confBtn = document.getElementById('amConfirm');
    confBtn.textContent = confirmText;
    confBtn.style.background = isDanger ? "linear-gradient(135deg, #fb7185, #e11d48)" : "linear-gradient(135deg, #667eea, #764ba2)";
    confBtn.style.boxShadow = isDanger ? "0 8px 25px rgba(225,29,72,0.4)" : "";
    
    confBtn.onclick = null;
    confBtn.onclick = () => { closeAuthModal(); if(onConfirm) onConfirm(); };
    document.getElementById('authModal').classList.remove('hidden');
}

function closeAuthModal() { document.getElementById('authModal').classList.add('hidden'); }

function removeActiveAccount(u) {
    let accounts = JSON.parse(localStorage.getItem('tpAccs') || '[]');
    let act = accounts.find(a => a.username === u);
    let p = act ? act.password : "Unknown - Please secure your credentials elsewhere";

    showAuthModal(
        "Remove Account?",
        `Are you sure you want to log out and remove ${u} from this device? Please save your generated password if you plan to log back in later.`,
        p,
        "Remove Account",
        () => {
            accounts = accounts.filter(a => a.username !== u);
            localStorage.setItem('tpAccs', JSON.stringify(accounts));
            window.location.href = '/logout';
        },
        true, true
    );
}

function toast(m,t='ok'){
    const c=document.getElementById('T'),d=document.createElement('div');
    d.className='toast '+t;d.textContent=m;
    c.appendChild(d);
    setTimeout(()=>d.remove(),2800);
}

const f=async(u,o)=> {
    try {
        const r=await fetch(A+u,o);
        if(!r.ok) throw new Error(`HTTP ${r.status}`);
        return await r.json();
    } catch(e) {
        console.error(`[Fetch Error] ${u}:`,e);
        toast(`Server error: ${e.message}`,'err');
        throw e;
    }
};

async function load(){
    try{
        const d=await f('/api/trips'),el=document.getElementById('list');
        if(!d.length){el.innerHTML='<div class="empty"><div class="empty-i">🗺️</div><div class="empty-t">No trips yet</div><div class="empty-h">Create your first trip or try the demo!</div></div>';return}
        el.innerHTML=d.map(t=>`<div class="trip-card" style="cursor:pointer" onclick="window.location.href='/trip/${t.id}'"><div class="trip-icon">🏕️</div><div class="trip-info"><div class="trip-nm">${esc(t.name)}</div><div class="trip-mt">${t.member_count} members</div></div><div class="trip-val" style="display:flex;align-items:center;gap:12px">₹${fmt(t.total_expense)} <button class="btn btn-sm" title="Delete Trip" style="padding:4px 8px;font-size:0.8rem;background:rgba(239, 68, 68, 0.2);color:#ef4444;border:none;border-radius:6px;" onclick="deleteTrip(event, ${t.id}, '${esc(t.name).replace(/'/g, "\\'")}')">🗑️</button></div></div>`).join('');
    }
    catch(e){document.getElementById('list').innerHTML='<p class="empty-h">Could not load trips</p>'}
}

function openC(){document.getElementById('cModal').classList.remove('hidden');document.getElementById('iName').focus()}
function closeC(){document.getElementById('cModal').classList.add('hidden')}

function addR(nameStr = ''){
    const c=document.getElementById('rows'),d=document.createElement('div');
    d.className='mrow';
    d.innerHTML=`<div style="flex:1"><label>Member Name</label><input placeholder="e.g. Charlie" data-f="n" value="${nameStr}"></div><div style="width:105px"><label>Put In (₹)</label><input type="number" placeholder="0" data-f="p" value="0"></div><button class="mrm" title="Remove Member" onclick="this.parentElement.remove()">✕</button>`;
    c.appendChild(d);
}

const trMic = document.getElementById('trMic');
const trAiBox = document.getElementById('trAiBox');
let trRec = null, isTrRec = false;

if('webkitSpeechRecognition' in window||'SpeechRecognition' in window){
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    trRec=new SR();trRec.lang='en-IN';
    trRec.onresult=ev=>{
        const t=ev.results[0][0].transcript;
        stopTrR();
        trAiBox.textContent = `Auto-filling...`;
        parseTripAI(t);
    };
    trRec.onend=()=>stopTrR()
}
trMic.addEventListener('click',()=>{if(!trRec)return;if(isTrRec){trRec.stop()}else{trRec.start();startTrR()}});
function startTrR(){isTrRec=true;trMic.classList.add('on');trMic.textContent='⏺';trAiBox.style.display='block';trAiBox.innerHTML='<div class="spin" style="width:12px;height:12px;border-width:2px;display:inline-block;vertical-align:middle;margin-right:6px"></div> Listening... Speak now!';}
function stopTrR(){isTrRec=false;trMic.classList.remove('on');trMic.textContent='🎤';}

async function parseTripAI(text) {
    try {
        const r = await fetch('/api/parse-trip', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text})});
        const d = await r.json();
        
        if(d.trip_name && d.trip_name !== "New Trip") document.getElementById('iName').value = d.trip_name;
        
        if(d.members && d.members.length > 0) {
            document.getElementById('rows').innerHTML = '';
            d.members.forEach(m => addR(m));
        }
        
        trAiBox.textContent = '✨ Auto-filled successfully!';
        setTimeout(() => trAiBox.style.display='none', 2500);
    } catch(e) {
        trAiBox.textContent = 'Failed to parse voice.';
        setTimeout(() => trAiBox.style.display='none', 2000);
    }
}

async function create(){
    const name=document.getElementById('iName').value.trim();
    if(!name){toast('Enter a trip name','err');return}
    const rows=document.querySelectorAll('#rows .mrow'),mem=[];
    rows.forEach(r=>{const n=r.querySelector('[data-f="n"]').value.trim(),p=parseFloat(r.querySelector('[data-f="p"]').value)||0;if(n)mem.push({name:n,contribution:p})});
    if(mem.length<2){toast('Add at least 2 members','err');return}
    try{const d = await f('/api/trips',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,members:mem})});toast('Trip created! 🎉');closeC();window.location.href='/trip/'+d.id}
    catch(e){ }
}

document.getElementById('seedBtn').addEventListener('click',async()=>{try{await f('/api/seed',{method:'POST'});toast('Demo loaded! 🏔️');load()}catch(e){ }});
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function fmt(n){return Number(n||0).toLocaleString('en-IN')}

async function deleteTrip(e, id, name) {
    if(e) { e.preventDefault(); e.stopPropagation(); }
    if(confirm(`Are you sure you want to delete the trip "${name}"? This action cannot be undone.`)){
        try {
            await f(`/api/trips/${id}`, {method: 'DELETE'});
            toast('Trip deleted! 🗑️');
            load();
        } catch(err) {}
    }
}

load();
</script>
</body>
</html>
